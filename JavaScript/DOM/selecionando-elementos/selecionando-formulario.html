<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionando Elementos</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    
    <form action="" name="cadastro">
        <input type="text" name="nome" id="">
        <input type="text" name="email" id="">
        <select name="sexo" id="">
            <option value="">----</option>
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
        </select>
    </form>

    <button onclick="salvar()">Salvar</button>
   

    <script>

        const obj = document.getElementsByName('cadastro')
        document.cadastro.cadastro.nome.value = 'Caio'

        function salvar(){
            document.cadastro.sexo.value = 'masculino'
            document.cadastro.nome.value = 'Caio'
            document.cadastro.email.value = 'caio@example.com'
        }

    </script>

</body>
</html>
